name: Bump Version

on:
  workflow_call:

jobs:
  bump-version:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!startsWith(github.event.head_commit.message, 'chore: release') &&
       !startsWith(github.event.head_commit.message, 'chore(develop): release'))
    runs-on: ubuntu-24.04

    steps:
      - name: Verify branch
        env:
          REF: ${{ github.ref }}
        run: |
          if [ "$REF" != "refs/heads/develop" ]; then
            echo "::error::bump-version must run on develop. Got: $REF"
            exit 1
          fi

      - name: Run Release Please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ secrets.RELEASE_MERGE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: develop
          skip-github-release: true

      - name: Auto-merge release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_MERGE_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HEAD_BRANCH: release-please--branches--develop--components--${{ github.event.repository.name }}
        run: |
          pr="$(gh pr list --state open --head "$HEAD_BRANCH" --json number --jq '.[0].number // empty')"
          if [ -z "$pr" ]; then
            echo "No open release PR; nothing to merge."
            exit 0
          fi
          identity="$(gh pr view "$pr" --json author,isCrossRepository,files \
            --jq '"\(.author.login) \(.isCrossRepository) \([.files[].path] | sort | join(","))"')"
          if [ "$identity" != "brunofgmag false .release-please-manifest.json,CHANGELOG.md,VERSION.txt" ]; then
            echo "::error::PR #$pr does not look like a legitimate release PR ($identity)"
            exit 1
          fi
          gh pr merge "$pr" --squash --admin
          gh pr edit "$pr" --remove-label "autorelease: pending"

      # Tag the release commit on develop so release-please can find the
      # previous release in the target branch history; without this every
      # changelog accumulates all commits since the first release.
      - name: Tag release commit
        env:
          GH_TOKEN: ${{ secrets.RELEASE_MERGE_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HEAD_BRANCH: release-please--branches--develop--components--${{ github.event.repository.name }}
        run: |
          pr="$(gh pr list --state merged --head "$HEAD_BRANCH" --limit 1 --json number --jq '.[0].number // empty')"
          if [ -z "$pr" ]; then
            echo "No merged release PR; nothing to tag."
            exit 0
          fi
          sha=""
          for _ in 1 2 3; do
            sha="$(gh pr view "$pr" --json mergeCommit --jq '.mergeCommit.oid // empty')"
            [ -n "$sha" ] && break
            sleep 3
          done
          if [ -z "$sha" ]; then
            echo "::error::Could not resolve merge commit for release PR #$pr"
            exit 1
          fi
          version="$(gh api "repos/$GH_REPO/contents/VERSION.txt?ref=$sha" --jq '.content' | base64 -d | tr -d '[:space:]')"
          if gh api "repos/$GH_REPO/git/ref/tags/v$version" >/dev/null 2>&1; then
            echo "Tag v$version already exists; skipping."
          else
            gh api "repos/$GH_REPO/git/refs" -f ref="refs/tags/v$version" -f sha="$sha"
          fi
